<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Money </title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="chat-app">
        <div class="chat-header">
            <div class="contact-info">
                <div class="contact-name" id="emergencyBtn">Mpesa</div>
                <div class="contact-status"></div>
            </div>
        </div>
        <div class="chat-body">
            <div class="message received" id="output"></div>
        </div>
        <div class="chat-footer">
            <form id="transactionForm">
                <textarea id="bulkInput" placeholder="Enter: recipient name , amount, recipient number, current balance" required></textarea>
                <button id="sendBtn" type="submit">Send</button>
            </form>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
